name: Publish to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Set version from tag
        run: npm version $(echo $GITHUB_REF_NAME | sed 's/^v//') --no-git-tag-version
        
      - name: Publish
        run: npm publish --access public --provenance
