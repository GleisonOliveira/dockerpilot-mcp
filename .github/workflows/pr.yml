name: PR Checks

on:
  pull_request:
    branches: [main]
    types: [opened, edited, synchronize, reopened]

jobs:
  label:
    name: Apply Labels
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml

      - name: Label by PR title prefix
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = context.payload.pull_request.title;
            const typeMap = {
              'feat':     'feature',
              'fix':      'bugfix',
              'refactor': 'refactor',
              'docs':     'documentation',
              'chore':    'chore',
              'test':     'test',
              'perf':     'performance',
              'ci':       'ci',
              'build':    'build',
              'style':    'style',
            };

            const match = title.match(/^(\w+)(\(.+\))?!?:/);
            if (!match) return;

            const label = typeMap[match[1]];
            if (!label) return;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: [label],
            });

  validate-title:
    name: Validate PR Title
    runs-on: ubuntu-latest

    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = context.payload.pull_request.title;
            const valid = /^(feat|fix|refactor|docs|chore|test|perf|ci|build|style)(\(.+\))?!?:\s.+/.test(title);
            if (!valid) {
              core.setFailed(
                `PR title "${title}" não segue Conventional Commits.\n` +
                `Formato esperado: <tipo>: <descrição>\n` +
                `Tipos válidos: feat, fix, refactor, docs, chore, test, perf, ci, build, style`
              );
            }

  lint-test:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: [label, validate-title]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run type check, lint and coverage
        run: npm run check
